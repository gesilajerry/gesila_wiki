<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>搜索结果 - Jerry 知识维基</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:#1a1a2e;background:#f0f2f5;line-height:1.7;}
a{color:#1446c0;text-decoration:none;}
.header{
  background:linear-gradient(135deg,#0a1f5c,#1446c0);color:#fff;
  display:flex;align-items:center;height:52px;padding:0 16px;gap:10px;
  position:sticky;top:0;z-index:100;
}
.header h1{font-size:16px;font-weight:700;white-space:nowrap;flex-shrink:0;color:#fff;}
.header nav{display:flex;gap:4px;flex:1;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}
.header nav::-webkit-scrollbar{display:none;}
.header nav a{color:rgba(255,255,255,.85);font-size:12px;padding:5px 10px;border-radius:14px;white-space:nowrap;flex-shrink:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);}
.header nav a:hover{background:rgba(255,255,255,.18);color:#fff;text-decoration:none;}
.container{max-width:1100px;margin:0 auto;padding:30px 20px;}
.search-bar{margin-bottom:24px;}
.search-bar input{padding:10px 18px;border-radius:25px;border:2px solid #0a1f5c;outline:none;font-size:15px;width:400px;}
.search-bar button{padding:10px 20px;background:#0a1f5c;color:#fff;border-radius:25px;border:none;font-size:14px;cursor:pointer;margin-left:10px;}
.result-count{font-size:13px;color:#6b7280;margin-bottom:16px;}
.result-item{background:#fff;border-radius:10px;padding:18px 22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:3px solid #0a1f5c;}
.result-item h3{font-size:15px;font-weight:700;color:#0a1f5c;margin-bottom:6px;}
.result-item .meta{font-size:11px;color:#9ca3af;margin-bottom:8px;}
.result-item .summary{font-size:13px;color:#374151;line-height:1.6;}
.result-item a:hover{text-decoration:none;}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.tag{font-size:10px;padding:2px 8px;border-radius:3px;background:#eff6ff;color:#1446c0;}
</style>
</head>
<body>
<div class="header">
  <h1>🧠 Jerry 知识维基</h1>
  <nav><a href="/">首页</a><a href="/graph">图谱</a><a href="/tags">标签</a></nav>
</div>
<div class="container">
  <div class="search-bar">
    <form action="/search" method="get">
      <input type="text" name="q" placeholder="搜索知识点..." value="{{query}}">
      <button type="submit">🔍 搜索</button>
    </form>
  </div>
  {% if query %}
  <div class="result-count">{% if results %}{{results|length}}{% else %}0{% endif %} 个结果： "{{query}}"</div>
  {% endif %}
  {% for card in results %}
  <div class="result-item">
    <h3><a href="/card/{{card.slug}}">{{card.title}}</a></h3>
    <div class="meta">{{card.category}} · {{card.date or ''}}</div>
    <div class="summary">{{card.summary}}</div>
    <div class="tags">
      {% for tag in card.tags[:6] %}<span class="tag">{{tag}}</span>{% endfor %}
    </div>
  </div>
  {% endfor %}
</div>
</body>
</html>
