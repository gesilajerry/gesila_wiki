<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{category}} - Jerry 知识维基</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:#1a1a2e;background:#f0f2f5;line-height:1.7;}
a{color:#1446c0;text-decoration:none;}
a:hover{text-decoration:underline;}
.header{
  background:linear-gradient(135deg,#0a1f5c,#1446c0);color:#fff;
  display:flex;align-items:center;height:52px;padding:0 16px;gap:10px;
  position:sticky;top:0;z-index:100;
}
.header h1{font-size:16px;font-weight:700;white-space:nowrap;flex-shrink:0;color:#fff;}
.header nav{display:flex;gap:4px;flex:1;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}
.header nav::-webkit-scrollbar{display:none;}
.header nav a{color:rgba(255,255,255,.85);font-size:12px;padding:5px 10px;border-radius:14px;white-space:nowrap;flex-shrink:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);}
.header nav a:hover{background:rgba(255,255,255,.18);color:#fff;text-decoration:none;}
.container{max-width:1100px;margin:0 auto;padding:20px 16px;}
.section h2{font-size:17px;font-weight:700;color:#0a1f5c;margin-bottom:16px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.card-item{background:#fff;border-radius:10px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:3px solid #0a1f5c;transition:box-shadow .2s;}
.card-item:hover{box-shadow:0 4px 16px rgba(0,0,0,.14);}
.card-item.orange{border-left-color:#d97706;}
.card-item.teal{border-left-color:#0f766e;}
.card-item.green{border-left-color:#15803d;}
.card-item .card-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:6px;}
.card-item .card-meta{font-size:11px;color:#9ca3af;margin-bottom:8px;}
.card-item .card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tag{font-size:10px;padding:2px 8px;border-radius:3px;background:#eff6ff;color:#1446c0;}
.card-item.orange .tag{background:#fffbeb;color:#d97706;}
.card-item.teal .tag{background:#f0fdfa;color:#0f766e;}
.card-item.green .tag{background:#f0fdf4;color:#15803d;}
.card-item .card-summary{font-size:12px;color:#6b7280;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.empty{text-align:center;padding:60px;color:#9ca3af;font-size:14px;}
</style>
</head>
<body>
<div class="header">
  <h1>🧠 Jerry 知识维基</h1>
  <nav>
    <a href="/">首页</a>
    <a href="/graph">图谱</a>
    <a href="/tags">标签</a>
  </nav>
</div>
<div class="container">
  <div class="section">
    <h2>📁 {{category}}（共 {{cards|length}} 篇）</h2>
    {% if cards %}
    <div class="cards-grid">
      {% for card in cards %}
      <div class="card-item {% if card.category == '概念卡' %}blue{% elif card.category == '方法论' %}teal{% elif card.category == '案例库' %}green{% elif card.category == '项目复盘' %}orange{% endif %}">
        <div class="card-title"><a href="/card/{{card.slug}}">{{card.title}}</a></div>
        <div class="card-meta">{{card.date or '无日期'}}</div>
        <div class="card-tags">
          {% for tag in card.tags[:4] %}<span class="tag">{{tag}}</span>{% endfor %}
        </div>
        <div class="card-summary">{{card.summary}}</div>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <div class="empty">该分类下暂无内容</div>
    {% endif %}
  </div>
</div>
</body>
</html>
